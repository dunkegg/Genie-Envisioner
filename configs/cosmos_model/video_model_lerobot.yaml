model_name: 'cosmos_train'
is_i2v: True
report_to: None
tracker_name: cosmos_trainer

logging_dir: logs
output_dir: OUTPUTS/logs
pretrained_model_name_or_path: checkpoints/Cosmos-Predict2-2B-Video2World

###
train_data_class_path: data/lerobot_like_dataset.py
train_data_class: CustomLeRobotDataset
val_data_class_path: data/lerobot_like_dataset.py
val_data_class: CustomLeRobotDataset


### 
tokenizer_class_path: transformers
tokenizer_class: T5TokenizerFast
textenc_class_path: transformers
textenc_class: T5EncoderModel

vae_class_path: models/cosmos_models/models/autoencoders/autoencoder_kl_wan.py
vae_class: AutoencoderKLWan

diffusion_model_class_path: models/cosmos_models/models/transformers/transformer_cosmos_multiview.py
diffusion_model_class: MultiViewCosmosTransformer3DModel

diffusion_scheduler_class_path: models/pipeline/gesim_cosmos2_pipeline_utils/scheduling_flow_match_euler_discrete.py
diffusion_scheduler_class: FlowMatchEulerDiscreteScheduler 

pipeline_class_path: models/pipeline/gesim_pipeline.py
pipeline_class: GeSimCosmos2Pipeline


# ### 
# tokenizer_class_path: transformers
# tokenizer_class: T5Tokenizer
# textenc_class_path: transformers
# textenc_class: T5EncoderModel
# vae_class_path: models/ltx_models/autoencoder_kl_ltx.py
# vae_class: AutoencoderKLLTXVideo
# diffusion_model_class_path: models/ltx_models/transformer_ltx_multiview.py
# diffusion_model_class: LTXVideoTransformer3DModel
# diffusion_scheduler_class_path: diffusers
# diffusion_scheduler_class: FlowMatchEulerDiscreteScheduler

# pipeline_class_path: models/pipeline/custom_pipeline.py
# pipeline_class: CustomPipeline

# 
return_action: false
return_video: true
train_mode: 'video_only'
action_loss_scale: 1.0

# total training step is decided by the minimum of the below two
train_steps: 1000000
train_epochs: 10000
steps_to_save: 2000
steps_to_log: 20
steps_to_val: 2000

mixed_precision: bf16
allow_tf32: False

# timeout, seconds
nccl_timeout: 600
seed: 42

# vae
enable_slicing: True
enable_tiling: True

add_state: False ### whether add state to the action chunk

caption_dropout_p: 0.06

# dataloader
batch_size: 2
dataloader_num_workers: 8
pin_memory: True

gradient_checkpointing: True
noise_to_first_frame: 0.1

# Optimizer Config
optimizer: adamw
lr: 3e-5
beta1: 0.9
beta2: 0.95
beta3: 0.999
epsilon: 1e-8
weight_decay: 1e-5
optimizer_8bit: False
optimizer_torchao: False
scale_lr: False

max_grad_norm: 1.0
gradient_accumulation_steps: 1

# lr_scheduler Config
lr_scheduler: constant_with_warmup
lr_warmup_steps: 1000
lr_num_cycles: 1
lr_power: 1.0


# Timestep Config
flow_weighting_scheme: none
flow_logit_mean: 0.0
flow_logit_std: 1.0
flow_mode_scale: 1.29

pixel_wise_timestep: True #todo

diffusion_model:
  model_path: checkpoints/Cosmos-Predict2-2B-Video2World/transformer

  config:
    in_channels: 26  # 16 (vae) + 3 (traj) + 6 (raymap) + 1 (padding mask)
    out_channels: 16
    num_attention_heads: 16
    attention_head_dim: 128
    num_layers: 28
    mlp_ratio: 4.0
    text_embed_dim: 1024
    adaln_lora_dim: 256
    max_size: [128, 240, 240]
    patch_size: [1, 2, 2]
    rope_scale: [1.0, 3.0, 3.0]
    concat_padding_mask: true  # TODO: no idea how does this work
    extra_pos_embed_type: null
    use_view_embed: true
    action_expert: false
    action_in_channels: 8
    action_num_attention_heads: 16
    action_attention_head_dim: 32
    action_rope_dim: 32


data:
### more details can be found in data/utils/*_dataset.py
  train:
    data_roots: ["lerobot_data"]
    domains: ["move_to_object", ]
    sample_size: [192, 256]
    sample_n_frames: 900
    preprocess :  'resize'
    # valid_cam :  ['observation.images.top_head', 'observation.images.hand_left', 'observation.images.hand_right']
    valid_cam :  ['observation.images.chest']
    action_key:   "actions"
    state_key:    "observation.state" 
    chunk: 9
    action_chunk: 54
    n_previous: 4
    previous_pick_mode: 'random'
    random_crop: False
    dataset_info_cache_path: "OUTPUTS/dataset_meta_info_cache/train"
    action_type: "absolute"
    action_space: "joint"
    stat_file: "lerobot_data/move_to_object/statistics.json"
  val:
    data_roots: ["lerobot_data"]
    domains: ["move_to_object", ]
    sample_size: [192, 256]
    sample_n_frames: 900
    preprocess :  'resize'
    # valid_cam :  ['observation.images.top_head', 'observation.images.hand_left', 'observation.images.hand_right']
    valid_cam :  ['observation.images.chest']
    action_key:   "actions"
    state_key:    "observation.state" 
    chunk: 9
    action_chunk: 54
    n_previous: 4
    previous_pick_mode: 'random'
    random_crop: False
    dataset_info_cache_path: "OUTPUTS/dataset_meta_info_cache/val"
    action_type: "absolute"
    action_space: "joint"
    stat_file: "lerobot_data/move_to_object/statistics.json"


use_color_jitter: true
num_inference_step: 5
noisy_video: true

# false for quick debug, for training set True
load_weights: true

# deepspeed config
use_deepspeed: true
deepspeed:
  zero_optimization:
    stage: 2
    # offload_optimizer:
    #   device: cpu
  fp16:
    enabled: false
  bf16:
    enabled: true
  gradient_clipping: 1.0
